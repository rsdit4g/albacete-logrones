<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#cfe2ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sheen2" x1="1" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- irregular wavy white band sweeping from top-left -->
  <path d="M0,0 L1440,0 L1440,260
           C1180,360 1010,180 760,300
           C520,415 330,250 120,360
           C70,385 30,360 0,400 Z" fill="url(#sheen)"/>
  <!-- second softer wave lower-right -->
  <path d="M1440,1024 L0,1024 L0,820
           C260,720 470,900 720,790
           C980,675 1180,860 1440,740 Z" fill="url(#sheen2)"/>
</svg>
